<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        html, body { height: 100%; margin: 0; background: #ffffff; }
        #editor { height: 100%; }
        .cm-editor { height: 100%; font-family: Consolas, 'Courier New', monospace; font-size: 14px; }
        .cm-content { white-space: pre-wrap; }
    </style>
</head>
<body>
    <div id="loading">Loading editor…</div>
    <div id="error" style="display:none;color:#b00020;font-family:'Segoe UI',Arial,sans-serif;padding:12px;"></div>
    <div id="editor" style="display:none;"></div>
    <script type="module">
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const editorEl = document.getElementById('editor');

        function showError(message) {
            loadingEl.style.display = 'none';
            editorEl.style.display = 'none';
            errorEl.style.display = 'block';
            errorEl.textContent = message;
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage({ type: 'error', message });
            }
        }

        window.addEventListener('error', (event) => {
            if (event?.message) {
                showError(event.message);
            }
        });

        window.addEventListener('unhandledrejection', (event) => {
            const message = event?.reason?.message || String(event?.reason || 'Unhandled promise rejection');
            showError(message);
        });

        try {
            const start = performance.now();
            window.chrome.webview.postMessage({ type: 'timing', message: `[EditorTiming] html-start ${start.toFixed(1)}ms` });

            const { createEditor } = await import('./editor.bundle.js');
            window.chrome.webview.postMessage({ type: 'timing', message: `[EditorTiming] bundle-loaded ${performance.now().toFixed(1)}ms` });

            const api = createEditor(editorEl, (text) => {
                window.chrome.webview.postMessage({ type: 'contentChanged', text });
            });
            window.chrome.webview.postMessage({ type: 'timing', message: `[EditorTiming] editor-created ${performance.now().toFixed(1)}ms` });

            function handleMessage(message) {
                const { id, command, payload } = message;
                let result = null;

                switch (command) {
                    case 'setText':
                        api.setText(payload.text || '');
                        break;
                    case 'getText':
                        result = api.getText();
                        break;
                    case 'getSelection':
                        result = api.getSelection();
                        break;
                    case 'findNext':
                        result = api.findNext(payload.query || '', payload.matchCase === true);
                        break;
                    case 'findPrevious':
                        result = api.findPrevious(payload.query || '', payload.matchCase === true);
                        break;
                    case 'replaceNext':
                        result = api.replaceNext(payload.query || '', payload.replacement || '', payload.matchCase === true);
                        break;
                    case 'replaceAll':
                        result = api.replaceAll(payload.query || '', payload.replacement || '', payload.matchCase === true);
                        break;
                    case 'setReadOnly':
                        api.setReadOnly(payload.isReadOnly === true);
                        break;
                }

                if (id != null) {
                    window.chrome.webview.postMessage({ id, result });
                }
            }

            window.chrome.webview.addEventListener('message', (event) => {
                handleMessage(event.data);
            });

            loadingEl.style.display = 'none';
            editorEl.style.display = 'block';

            window.chrome.webview.postMessage({ type: 'ready' });
            window.chrome.webview.postMessage({ type: 'timing', message: `[EditorTiming] ready-posted ${performance.now().toFixed(1)}ms` });
        } catch (error) {
            showError(`Failed to load CodeMirror modules: ${error?.message || error}`);
            throw error;
        }
    </script>
</body>
</html>
